             <!-- Đáp án C -->

                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1" for="manualAnswerC">Đáp án C</label>
                <input id="manualAnswerC" type="text" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-brand/10 outline-none font-bold text-base sm:text-sm mb-2" placeholder="Nội dung đáp án c" required>

                        <i class="fa-solid fa-paperclip"></i> Ảnh
                        <input type="file" id="manualAnswerCImgInput" accept="image/*" class="hidden">
                    </label>
                    <img id="manualAnswerCImgPreview" class="h-6 rounded border hidden"/>
                    <button type="button" id="manualRemoveCImgBtn" class="text-red-500 hidden text-xs"><i class="fa-solid fa-xmark"></i></button>
                </div>
             </div>
             <!-- Đáp án D -->
             <div class="p-4 border border-slate-200 rounded-xl bg-white shadow-sm">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1" for="manualAnswerD">Đáp án D</label>
                <input id="manualAnswerD" type="text" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-brand/10 outline-none font-bold text-base sm:text-sm mb-2" placeholder="Nội dung đáp án d" required>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6 items-end pt-4 border-t border-slate-100">

    </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, getDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getDatabase, ref, onValue, onDisconnect, set, push } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

    // ==== CHUYỂN ĐỔI CHẾ ĐỘ CÂU HỎI (HTML vs Manual) ====
    window.switchQMode = function(mode) {
      document.getElementById('mode-choice').style.display = mode === 'choice' ? 'flex' : 'none';
      document.getElementById('mode-import').style.display = mode === 'import' ? 'block' : 'none';
      document.getElementById('mode-manual').style.display = mode === 'manual' ? 'block' : 'none';
    };

    // ==== FIREBASE CONFIG ====
    const firebaseConfig = {
  apiKey: "AIzaSyCJsRBkKLSzRtlwIMZ7PsH4LA0kM9NgdgQ",
  authDomain: "tracuuou.firebaseapp.com",
  projectId: "tracuuou",
  storageBucket: "tracuuou.firebasestorage.app",
  messagingSenderId: "323809672192",
  appId: "1:323809672192:web:745f8f951fed28fd296ce5",
  measurementId: "G-SQRR8YFNVV"
};
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const rtdb = getDatabase(app, "https://tracuuou-default-rtdb.asia-southeast1.firebasedatabase.app");

    // ONLINE COUNTER
    const onlineCounterEl = document.getElementById('online-counter');
    const connectionsRef = ref(rtdb, 'connections');
    const myConnectionRef = push(connectionsRef);
    onDisconnect(myConnectionRef).remove();
    set(myConnectionRef, true);
    onValue(connectionsRef, (snapshot) => {
      onlineCounterEl.textContent = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
    });

    // SEARCHABLE DROPDOWN
    function initSearchableDropdown(btnId, containerId, listId, searchId, textId, hiddenId, subjects, callback) {
      const btn = document.getElementById(btnId), container = document.getElementById(containerId), list = document.getElementById(listId);
      const search = document.getElementById(searchId), text = document.getElementById(textId), hidden = document.getElementById(hiddenId);
      if(!btn) return;
      
      const render = (items) => {
        list.innerHTML = items.length ? '' : '<div class="p-4 text-center text-slate-400 text-xs italic font-medium">Không tìm thấy</div>';
        items.forEach(s => {
          const btnItem = document.createElement('button');
          btnItem.type = 'button';
          btnItem.className = 'block w-full text-left px-4 py-3.5 sm:py-2.5 text-sm font-bold text-slate-700 hover:bg-brand/5 hover:text-brand rounded-lg transition-all cursor-pointer active:bg-brand/10 border-b border-slate-50';
          btnItem.textContent = s.name;
          
          btnItem.onclick = (e) => {
            e.preventDefault();
            hidden.value = s.id; 
            hidden.dispatchEvent(new Event('change'));
            text.textContent = s.name; 
            text.className = 'text-brand font-black truncate text-sm uppercase tracking-tight';
            container.classList.add('hidden');
            if (callback) callback(s.id);
          };
          list.appendChild(btnItem);
        });
      };
      
      btn.addEventListener('click', (e) => { 
        e.preventDefault();
        e.stopPropagation(); 
        const isOpen = !container.classList.contains('hidden');
        document.querySelectorAll('[id$="Container"]').forEach(c => c.classList.add('hidden'));
        if(!isOpen) { 
          container.classList.remove('hidden'); 
          if (window.innerWidth > 768) search.focus(); 
        }
      });
      
      search.oninput = () => render(subjects.filter(s => s.name.toLowerCase().includes(search.value.toLowerCase())));
      
      document.addEventListener('click', (e) => { 
        if(!btn.contains(e.target) && !container.contains(e.target)) {
          container.classList.add('hidden'); 
        }
      });
      render(subjects);
    }

    // LOAD SUBJECTS
    let allSubjects = [];
    async function getSubjects() {
      try {
        const snap = await getDocs(collection(db, "mon_hoc"));
        allSubjects = snap.docs.map(d => ({ id: d.id, name: d.data().ten_mon || d.id }));
        allSubjects.sort((a,b) => a.name.localeCompare(b.name, 'vi'));
        
        initSearchableDropdown('btnImportSubject', 'listImportSubjectContainer', 'listImportSubject', 'searchImportSubject', 'textImportSubject', 'valImportSubject', allSubjects, async (id) => {
          document.getElementById('importHtmlInput').disabled = false;
          window.currentSubjectQuestions = await loadQuestionsForSubject(id);
        });
        
        initSearchableDropdown('btnManualSubject', 'listManualSubjectContainer', 'listManualSubject', 'searchManualSubject', 'textManualSubject', 'valManualSubject', allSubjects);
      } catch (err) { console.error(err); }
    }
    getSubjects();

    async function loadQuestionsForSubject(id) {
      const q = query(collection(db, "cau_hoi"), where("mon_hoc_id", "==", id));
      const snap = await getDocs(q);
      return snap.docs.map(d => d.data());
    }

    // UTILS
    const normalizeCompareString = (str) => {
      return (str || "")
        .replace(/\\\(|\\\)|\[HÌNH ẢNH\]/g, "")
        .replace(/<.*?>/g, "")
        .replace(/[\s\r\n]+/g, " ")
        .trim()
        .toLowerCase();
    };

    const getNormalizedAnswers = (lua_chon) => {
      return ['a','b','c','d'].map(k => normalizeCompareString(lua_chon?.[k])).filter(x => x);
    };

    function isDuplicateInSet(question, existSet) {
      const content = normalizeCompareString(question.noi_dung);
      const answers = getNormalizedAnswers(question.lua_chon).sort();
      const correctContent = normalizeCompareString(question.lua_chon?.[question.dap_an_dung]);
      
      for (const q of existSet) {
        const qContent = normalizeCompareString(q.noi_dung);
        const qAnswers = getNormalizedAnswers(q.lua_chon).sort();
        const qCorrectContent = normalizeCompareString(q.lua_chon?.[q.dap_an_dung]);
        
        if (content !== qContent) continue;
        if (answers.length !== qAnswers.length) continue;
        let allAnswersMatch = answers.every((val, index) => val === qAnswers[index]);
        if (!allAnswersMatch) continue;
        if (correctContent === qCorrectContent) return true;
      }
      return false;
    }

    // SECURITY CHECK
    function setupSecurityCheck(inputId, statusId, btnId) {
      const input = document.getElementById(inputId);
      const status = document.getElementById(statusId);
      const btn = document.getElementById(btnId);
      input.addEventListener('input', async () => {
        const val = input.value.trim();
        status.textContent = val ? "Đang kiểm tra..." : "";
        if(btn) btn.disabled = true;
        if (!val) return;
        try {
          const snap = await getDoc(doc(db, "config", "security_code"));
          if (snap.exists() && snap.data().code === val) {
            status.innerHTML = '<span class="text-emerald-500 font-bold">MÃ HỢP LỆ ✅</span>';
            if (btn && btnId === 'saveImportBtn' && importedQuestions.length > 0) btn.disabled = false;
            if (btn && btnId === 'manualSubmitQuestionBtn') btn.disabled = false;
          } else {
            status.innerHTML = '<span class="text-red-500 font-bold">MÃ SAI ❌</span>';
          }
        } catch (err) {
          status.innerHTML = '<span class="text-red-500">Lỗi kết nối mã!</span>';
        }
      });
    }
    setupSecurityCheck('questionSecurityCodeImport', 'questionSecurityCodeStatusImport', 'saveImportBtn');
    setupSecurityCheck('questionSecurityCodeManual', 'questionSecurityCodeStatusManual', 'manualSubmitQuestionBtn');

    // MOODLE IMPORT
    let importedQuestions = [];
    let imagesFoundCount = 0;

    function extractTextAndLaTeX(node) {
      let result = "";
      if (!node) return result;
      node.childNodes.forEach(child => {
        if (child.nodeType === Node.TEXT_NODE) {
          result += child.textContent;
        } else if (child.nodeType === Node.ELEMENT_NODE) {
          if (child.tagName === "SCRIPT" && child.type && child.type.startsWith("math/tex")) {
            result += `\\(${child.textContent.trim()}\\)`;
          } else if (child.tagName === "SPAN" && (child.classList.contains("MathJax_Preview") || child.classList.contains("MathJax"))) {
            // Bỏ qua thẻ preview
          } else if (child.tagName === "IMG" && child.src) {
            imagesFoundCount++;
            result += ` [HÌNH ẢNH] `;
          } else {
            result += extractTextAndLaTeX(child);
          }
        }
      });
      return result.replace(/\s+/g, " ").trim();
    }

    document.getElementById("importHtmlInput").onchange = function(e) {
      const file = e.target.files[0];
      if(!file) return;
      const mon_hoc_id = document.getElementById("valImportSubject").value;
      if (!mon_hoc_id) return alert("Vui lòng chọn môn học trước!");
      
      const reader = new FileReader();
      reader.onload = async function(event) {
        imagesFoundCount = 0;
        const html = event.target.result;
        const parser = new DOMParser();
        const docx = parser.parseFromString(html, "text/html");
        importedQuestions = [];
        let rawQuestions = [];

        docx.querySelectorAll('.que').forEach(q => {
          let qtextNode = q.querySelector('.qtext');
          let questionText = qtextNode ? extractTextAndLaTeX(qtextNode) : '';
          const answerNodes = Array.from(q.querySelectorAll('.answer > div'));
          const answers = answerNodes.map(ansNode => extractTextAndLaTeX(ansNode.querySelector('.flex-fill, div.ml-1, .specificfeedback') || ansNode));
          
          let correctIdx = -1;
          const rightAnswerText = q.querySelector('.rightanswer')?.innerText || '';
          const match = rightAnswerText.match(/(?:The correct answer is:|Câu trả lời đúng là:)\s*(.+)$/);

          if (match) {
            const correctValue = match[1].trim();
            correctIdx = answers.findIndex(a => normalizeCompareString(a) === normalizeCompareString(correctValue));
          }
          if (correctIdx === -1) {
            correctIdx = answerNodes.findIndex(node => node.classList.contains('correct'));
          }
          const correctKey = correctIdx !== -1 ? ['a','b','c','d'][correctIdx] : '';

          if (questionText && answers.length >= 2 && correctKey) {
            rawQuestions.push({
              questionText, answers, correctIdx, correctKey,
              lua_chon: { a: answers[0]||"", b: answers[1]||"", c: answers[2]||"", d: answers[3]||"" }
            });
          }
        });

        const tempExistSet = [...(window.currentSubjectQuestions || [])];
        importedQuestions = rawQuestions.map(q => {
          const isDup = isDuplicateInSet({ noi_dung: q.questionText, dap_an_dung: q.correctKey, lua_chon: q.lua_chon }, tempExistSet);
          if(!isDup) tempExistSet.push({ noi_dung: q.questionText, dap_an_dung: q.correctKey, lua_chon: q.lua_chon });
          return { ...q, duplicate: isDup };
        });

        const duplicateCount = importedQuestions.filter(q => q.duplicate).length;
        
        // Update Stats Box
        const statsBox = document.getElementById("importHtmlStats");
        statsBox.style.display = 'block';
        statsBox.innerHTML = `
          <ul class="space-y-1">
             <li>- Tổng trích xuất: <b>${importedQuestions.length}</b> câu hỏi.</li>
             <li>- Trùng lặp: <b class="text-red-500">${duplicateCount}</b> câu (sẽ bỏ qua).</li>
             <li>- Phát hiện: <b class="text-amber-500">${imagesFoundCount}</b> ảnh trong đề.</li>
             ${imagesFoundCount > 0 ? '<li class="text-[10px] text-amber-600 italic uppercase tracking-widest mt-2 border-t border-amber-200/50 pt-2"><i class="fa-solid fa-triangle-exclamation"></i> Chú ý: Các câu chứa ảnh sẽ hiện "[HÌNH ẢNH]"</li>' : ''}
          </ul>
        `;

        let htmlResult = '';
        importedQuestions.forEach((q, idx) => {
          let answersHtml = q.answers.map((a, i) => {
            const isCorrect = i === q.correctIdx;
            const textClass = isCorrect ? 'text-emerald-600 font-bold' : 'text-slate-600';
            const icon = isCorrect ? '<i class="fa-solid fa-circle-check ml-2"></i><span class="text-[10px] uppercase ml-1 italic">(Đúng)</span>' : '';
            return `<div class="ml-4 mt-2 text-sm ${textClass}">${String.fromCharCode(97+i)}. <span class="mathjax-content break-words-custom">${a}</span> ${icon}</div>`;
          }).join('');

          htmlResult += `
          <div class="p-4 rounded-xl border border-slate-200 ${q.duplicate ? 'bg-red-50 opacity-80' : 'bg-white shadow-sm'}">
            <p class="font-black text-slate-800 text-sm mb-2 text-sharp break-words-custom">Câu ${idx+1}: <span class="mathjax-content">${q.questionText}</span></p>
            ${answersHtml}
            ${q.duplicate ? '<p class="text-[10px] font-black text-red-500 uppercase tracking-widest mt-3 pt-3 border-t border-red-200"><i class="fa-solid fa-ban"></i> Bị trùng</p>' : ''}
          </div>`;
        });
        document.getElementById('importHtmlResult').innerHTML = htmlResult;
        
        if (window.MathJax && window.MathJax.typesetPromise) {
          window.MathJax.typesetPromise(Array.from(document.querySelectorAll('.mathjax-content')));
        }

        const saveImportBtn = document.getElementById("saveImportBtn");
        saveImportBtn.style.display = importedQuestions.length > 0 ? "inline-flex" : "none";
        document.getElementById("questionSecurityCodeImport").dispatchEvent(new Event('input'));
      };
      reader.readAsText(file);
    };

    // SAVE IMPORT
    const saveImportBtn = document.getElementById("saveImportBtn");
    saveImportBtn.addEventListener('click', async function() {
      const mon_hoc_id = document.getElementById("valImportSubject").value;
      const questionsToSave = importedQuestions.filter(q => !q.duplicate);
      if (questionsToSave.length === 0) { alert("Không có câu hỏi mới nào để lưu (tất cả đều bị trùng)."); return; }
      
      this.disabled = true; this.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> ĐANG LƯU...';
      const securityCode = document.getElementById("questionSecurityCodeImport").value;
      
      let success = 0, fail = 0;
      for (const q of questionsToSave) {
        try {
          await addDoc(collection(db, "cau_hoi"), {
            mon_hoc_id,
            noi_dung: q.questionText,
            noi_dung_img: "",
            lua_chon: q.lua_chon,
            dap_an_dung: q.correctKey,
            security_code: securityCode
          });
          success++;
        } catch (e) { fail++; }
      }
      alert(`Hoàn tất! Đã lưu ${success} câu mới. Bỏ qua ${importedQuestions.length - success} câu trùng.`);
      window.location.reload();
    });

    // MANUAL UPLOAD IMAGES
    async function uploadToDrive(file) {
      const formData = new FormData();
      formData.append('file', file);
      const response = await fetch('https://tracuu-app.hugo.io.vn/api/upload', { method: 'POST', body: formData });
      if (!response.ok) throw new Error('Upload ảnh thất bại!');
      const result = await response.json();
      return result.url;
    }

    let manualQImgFile = null, manualAImgFiles = [null, null, null, null];
    function handleImgInput(input, preview, removeBtn, setFile) {
      input.addEventListener("change", function() {
        if(this.files && this.files[0]) {
          setFile(this.files[0]);
          preview.src = URL.createObjectURL(this.files[0]);
          preview.style.display = "block";
          removeBtn.style.display = "block";
        }
      });
      removeBtn.addEventListener("click", function() {
        setFile(null);
        preview.src = "";
        preview.style.display = "none";
        removeBtn.style.display = "none";
        input.value = "";
      });
    }
    
    handleImgInput(document.getElementById("manualQuestionImageInput"), document.getElementById("manualQuestionImgPreview"), document.getElementById("manualRemoveQuestionImgBtn"), f=>manualQImgFile=f);
    handleImgInput(document.getElementById("manualAnswerAImgInput"), document.getElementById("manualAnswerAImgPreview"), document.getElementById("manualRemoveAImgBtn"), f=>manualAImgFiles[0]=f);
    handleImgInput(document.getElementById("manualAnswerBImgInput"), document.getElementById("manualAnswerBImgPreview"), document.getElementById("manualRemoveBImgBtn"), f=>manualAImgFiles[1]=f);
    handleImgInput(document.getElementById("manualAnswerCImgInput"), document.getElementById("manualAnswerCImgPreview"), document.getElementById("manualRemoveCImgBtn"), f=>manualAImgFiles[2]=f);
    handleImgInput(document.getElementById("manualAnswerDImgInput"), document.getElementById("manualAnswerDImgPreview"), document.getElementById("manualRemoveDImgBtn"), f=>manualAImgFiles[3]=f);

    // MANUAL SUBMIT
    document.getElementById("manualQuestionForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const manualBtn = document.getElementById("manualSubmitQuestionBtn");
      manualBtn.disabled = true; manualBtn.textContent = "ĐANG XỬ LÝ DỮ LIỆU...";
      
      const subjectId = document.getElementById("valManualSubject").value;
      const qText = document.getElementById("manualQuestionText").value.trim();
      const a = document.getElementById("manualAnswerA").value.trim();
      const b = document.getElementById("manualAnswerB").value.trim();
      const c = document.getElementById("manualAnswerC").value.trim();
      const d = document.getElementById("manualAnswerD").value.trim();
      const correct = document.getElementById("manualCorrectAnswerDropdown").value;
      
      let noi_dung_img = '', lua_chon = {a,b,c,d};
      try {
        if (manualQImgFile) noi_dung_img = await uploadToDrive(manualQImgFile);
        if (manualAImgFiles[0]) lua_chon.aImg = await uploadToDrive(manualAImgFiles[0]);
        if (manualAImgFiles[1]) lua_chon.bImg = await uploadToDrive(manualAImgFiles[1]);
        if (manualAImgFiles[2]) lua_chon.cImg = await uploadToDrive(manualAImgFiles[2]);
        if (manualAImgFiles[3]) lua_chon.dImg = await uploadToDrive(manualAImgFiles[3]);
      } catch (err) {
        alert("Lỗi upload hình ảnh: " + err.message);
        manualBtn.disabled = false; manualBtn.textContent = "LƯU VÀO HỆ THỐNG";
        return;
      }

      const existSet = await loadQuestionsForSubject(subjectId);
      if (isDuplicateInSet({noi_dung: qText, dap_an_dung: correct, lua_chon}, existSet)) {
        alert("Câu hỏi này đã tồn tại trong môn học với đáp án đúng giống nhau!"); 
        manualBtn.disabled=false; manualBtn.textContent="LƯU VÀO HỆ THỐNG"; 
        return;
      }

      const securityCode = document.getElementById("questionSecurityCodeManual").value;
      try {
        await addDoc(collection(db, "cau_hoi"), { mon_hoc_id: subjectId, noi_dung: qText, noi_dung_img, lua_chon, dap_an_dung: correct, security_code: securityCode });
        alert("Đã thêm câu hỏi!"); window.location.reload();
      } catch (e) {
        alert("Thêm câu hỏi thất bại: " + e.message); 
        manualBtn.disabled=false; manualBtn.textContent="LƯU VÀO HỆ THỐNG";
      }
    });

    // PASTE HANDLER
    function bindPaste(el) {
       if(!el) return;
       el.addEventListener('paste', async (e) => {
         const items = e.clipboardData?.items || [];
         const file = Array.from(items).find(x => x.type.startsWith('image/'))?.getAsFile();
         if(!file) return;
         e.preventDefault();
         const reader = new FileReader();
         reader.onload = (ev) => {
           const tag = `<img src="${ev.target.result}" style="max-width:100%;height:auto;border-radius:8px;margin:10px 0;">`;
           const start = el.selectionStart, end = el.selectionEnd;
           el.value = el.value.slice(0, start) + tag + el.value.slice(end);
         };
         reader.readAsDataURL(file);
       });
    }
    ['manualQuestionText'].forEach(id => bindPaste(document.getElementById(id)));

    // LOAD NAVBAR
    document.addEventListener('DOMContentLoaded', () => {
      fetch('/menu.html').then(r => r.ok ? r.text() : "").then(h => { if(h) document.getElementById('navbar-placeholder').innerHTML = h; });
    });
  </script>
